name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
      - name: Validate app
        run: python3 scripts/validate.py
      - name: Build downloadable app ZIP
        run: |
          mkdir -p dist
          zip -r "dist/English_Thinking_Dictionary_Quest_${GITHUB_REF_NAME}.zip" . \
            -x '.git/*' 'dist/*' '.github/*' '*.DS_Store'
      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/English_Thinking_Dictionary_Quest_${GITHUB_REF_NAME}.zip" \
            --title "English Thinking Dictionary Quest $GITHUB_REF_NAME" \
            --generate-notes
