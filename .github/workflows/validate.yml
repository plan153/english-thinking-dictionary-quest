name: Validate app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate app files and version
        run: python3 scripts/validate.py
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run unit + domain tests
        run: |
          set -e
          for f in scripts/tests/*.js; do
            case "$f" in
              *e2e_learner_profiles.js) continue ;;
              *) echo "→ $f"; node "$f" ;;
            esac
          done
      - name: Run learner profile e2e
        run: node scripts/tests/e2e_learner_profiles.js
        env:
          E2E_ARTIFACT_DIR: browser-smoke-artifacts/qa-learner-profiles

  browser-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser smoke (mock Local REST → Next Practice → sync)
        run: node scripts/smoke_browser_sync_next_practice.js
        env:
          SMOKE_ARTIFACT_DIR: browser-smoke-artifacts
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke
          path: browser-smoke-artifacts/
          if-no-files-found: ignore
