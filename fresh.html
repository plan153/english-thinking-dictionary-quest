<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="robots" content="noindex" />
  <title>새 버전으로 새로고침…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-rounded, "SF Pro Rounded", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: #18212e;
      background: #f6f3ed;
      padding: 24px;
      text-align: center;
    }
    p { margin: 0; line-height: 1.5; }
    .muted { margin-top: 10px; color: #68717d; font-size: 14px; }
  </style>
</head>
<body>
  <div>
    <p><b>캐시를 지우고 새 버전으로 이동합니다…</b></p>
    <p class="muted">잠시만 기다려 주세요.</p>
  </div>
  <script>
    (async () => {
      const VERSION = '1.3.10';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((registration) => registration.unregister()));
        }
        if (typeof caches !== 'undefined') {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        try {
          localStorage.removeItem('etd-cache-version');
        } catch (_) {}
      } catch (error) {
        console.warn('fresh clear failed', error);
      }
      const stamp = Date.now();
      location.replace(`./index.html?v=${encodeURIComponent(VERSION)}&fresh=${stamp}#/home`);
    })();
  </script>
</body>
</html>
